name: Sango Agent Loop CI

on:
  push:
    branches:
      - "agent/**"
  pull_request:
    branches:
      - main

permissions:
  actions: read
  contents: read
  issues: write
  pull-requests: read

jobs:
  verify:
    name: Build, Test, Visual Verify
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: PR branch policy
        if: github.event_name == 'pull_request'
        shell: bash
        run: |
          set -euo pipefail
          case "${{ github.head_ref }}" in
            agent/*) ;;
            *) echo "Agent PR branches must use agent/<task-id>-<owner>."; exit 1 ;;
          esac

      - name: Agent loop self-check
        run: npm run agent:loop -- --json
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium webkit

      - name: Agent protocol check
        run: npm run agent:check

      - name: Queue contract validation
        run: npm run queue:validate

      - name: Asset manifest validation
        run: npm run assets:validate

      - name: Build
        run: npm run build

      - name: Validate data
        run: npm run validate:data

      - name: Playwright tests
        run: npm test

      - name: Visual verification
        run: npm run verify:visual

      - name: Canvas inspection
        shell: bash
        run: |
          set -euo pipefail
          npm run dev -- --port 5188 --strictPort > /tmp/sango-vite.log 2>&1 &
          VITE_PID=$!
          trap 'kill "$VITE_PID" 2>/dev/null || true; cat /tmp/sango-vite.log' EXIT
          for attempt in {1..30}; do
            if curl -fsS http://127.0.0.1:5188/ >/dev/null; then
              break
            fi
            sleep 1
          done
          curl -fsS http://127.0.0.1:5188/ >/dev/null
          npm run inspect:canvas
          node scripts/inspect-threejs-canvas.mjs --mobile --out artifacts/canvas-inspection

      - name: Upload visual artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: sango-debug-artifacts
          path: |
            artifacts/
            test-results/
            playwright-report/
          if-no-files-found: ignore
